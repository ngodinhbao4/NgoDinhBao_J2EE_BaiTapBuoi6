<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <title>Products Gallery</title>
  <th:block th:replace="~{_layout :: head}"></th:block>
</head>

<body class="d-flex flex-column min-vh-100">
  <div th:replace="~{_layout :: navbar}"></div>

  <div class="container mt-5 mb-5 flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-bold mb-0 text-dark">Products</h2>
      </div>
      <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/create}" class="btn btn-custom btn-primary-custom d-flex align-items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus-lg"
          viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z" />
        </svg>
        Add New Product
      </a>
    </div>

    <div class="card card-custom">
      <div class="table-responsive">
        <table class="table table-custom table-hover">
          <thead>
            <tr>
              <th class="ps-4">#</th>
              <th>Product Details</th>
              <th>Price</th>
              <th>Category</th>
              <th class="text-end pe-4">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="product, iterStat : ${products}">
              <td class="ps-4 fw-medium" th:text="${iterStat.count}"></td>
              <td>
                <div class="d-flex align-items-center gap-3">
                  <img th:if="${product.imageFileName != null and !product.imageFileName.isEmpty()}"
                    th:src="@{'/uploads/' + ${product.imageFileName}}" class="img-thumbnail-custom" alt="Product Image"
                    style="width: 60px; height: 60px;" />
                  <div th:unless="${product.imageFileName != null and !product.imageFileName.isEmpty()}"
                    class="bg-light rounded-3 d-flex align-items-center justify-content-center text-muted"
                    style="width: 60px; height: 60px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                      class="bi bi-image" viewBox="0 0 16 16">
                      <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
                      <path
                        d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z" />
                    </svg>
                  </div>
                  <span class="fw-semibold text-dark" th:text="${product.name}"></span>
                </div>
              </td>
              <td class="fw-medium text-success" th:text="${'$' + product.price}"></td>
              <td>
                <span class="badge-category"
                  th:text="${product.category != null ? product.category.name : 'Unknown'}"></span>
              </td>
              <td class="text-end pe-4">
                <div class="d-flex gap-2 justify-content-end">
                  <a sec:authorize="hasRole('ADMIN')" th:href="@{'/products/edit/' + ${product.id}}" class="btn btn-sm btn-light border rounded-3 px-3">
                    Edit
                  </a>
                  <form sec:authorize="hasRole('ADMIN')" th:action="@{'/products/delete/' + ${product.id}}" method="post" style="display: inline">
                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-3 px-3"
                      onclick="return confirm('Are you sure you want to delete this product?');">
                      Delete
                    </button>
                  </form>
                  <button sec:authorize="hasRole('USER')" type="button" class="btn btn-sm btn-success rounded-3 px-3"
                    onclick="alert('Order functionality to be implemented!');">
                    Order
                  </button>
                </div>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}">
              <td colspan="5" class="text-center py-5">
                <div class="text-muted d-flex flex-column align-items-center gap-3">
                  <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-inbox"
                    viewBox="0 0 16 16">
                    <path
                      d="M4.98 4a.5.5 0 0 0-.39.188L1.54 8H6a.5.5 0 0 1 .5.5 1.5 1.5 0 1 0 3 0A.5.5 0 0 1 10 8h4.46l-3.05-3.812A.5.5 0 0 0 11.02 4H4.98zm-1.17-.437A1.5 1.5 0 0 1 4.98 3h6.04a1.5 1.5 0 0 1 1.17.563l3.7 4.625a.5.5 0 0 1 .106.311l-.01.011v5.5a1.5 1.5 0 0 1-1.5 1.5H1.5a1.5 1.5 0 0 1-1.5-1.5V8.536l.01-.011a.5.5 0 0 1 .106-.31l3.7-4.625zM1 8.5v5a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-5h-3.03l-.08.08A2.5 2.5 0 0 1 8 11.25 2.5 2.5 0 0 1 4.11 8.58l-.08-.08H1z" />
                  </svg>
                  <span>No products found. Start by adding a new product.</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div th:replace="~{_layout :: footer}"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

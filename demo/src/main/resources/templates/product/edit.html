<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
    <th:block th:replace="~{_layout :: head}"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{_layout :: navbar}"></div>

    <div class="container mt-5 mb-5 flex-grow-1 d-flex justify-content-center">
        <div class="card card-custom w-100" style="max-width: 600px;">
            <div class="card-header-custom d-flex justify-content-between align-items-center">
                <h4 class="fw-bold mb-0 text-dark">Edit Product</h4>
                <a th:href="@{/products}" class="btn btn-sm btn-light border rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 36px; height: 36px;" title="Back to List">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-lg" viewBox="0 0 16 16">
                      <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854Z"/>
                    </svg>
                </a>
            </div>
            <div class="card-body p-4">
                <form th:action="@{'/products/edit/' + ${product.id}}" th:object="${product}" method="post" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label for="name" class="form-label form-label-custom">Product Name</label>
                        <input type="text" class="form-control form-control-custom" id="name" th:field="*{name}">
                        <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="price" class="form-label form-label-custom">Price</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted" style="border-radius: 10px 0 0 10px; border-color: #cbd5e1;">$</span>
                            <input type="number" step="0.01" class="form-control form-control-custom border-start-0" id="price" th:field="*{price}">
                        </div>
                        <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="categoryId" class="form-label form-label-custom">Category</label>
                        <select class="form-select form-control-custom" id="categoryId" name="categoryId">
                            <option value="">-- Select Category --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${product.category != null and product.category.id == cat.id}"></option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="image" class="form-label form-label-custom">Product Image</label>
                        
                        <div th:if="${product.imageFileName != null and !product.imageFileName.isEmpty()}" class="mb-3 d-flex align-items-center gap-3 p-3 border rounded-3 bg-light">
                            <img th:src="@{'/uploads/' + ${product.imageFileName}}" alt="Current Image"
                                 class="img-thumbnail-custom" style="width: 80px; height: 80px;">
                            <div>
                                <h6 class="mb-1 text-dark fw-semibold">Current Image</h6>
                                <p class="text-muted mb-0 small" th:text="${product.imageFileName}"></p>
                            </div>
                        </div>

                        <input type="file" class="form-control form-control-custom" id="image" name="image" accept="image/*">
                        <div class="form-text mt-2">Upload a new image to replace the current one. Leave blank to keep the existing image.</div>
                    </div>

                    <div class="d-flex gap-3 mt-5">
                        <button type="submit" class="btn btn-custom btn-primary-custom flex-grow-1 py-3 fw-bold">
                            Save Changes
                        </button>
                        <a th:href="@{/products}" class="btn btn-custom btn-light border flex-grow-1 py-3 fw-bold text-dark text-center text-decoration-none">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{_layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

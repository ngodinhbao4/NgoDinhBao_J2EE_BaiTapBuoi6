<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f2f5f9;
            color: #333;
        }

        .navbar-custom {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .navbar-custom .navbar-brand {
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .navbar-custom .nav-link {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            transition: color 0.3s;
        }

        .navbar-custom .nav-link:hover {
            color: #fff;
        }

        .card-custom {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: #fff;
            overflow: hidden;
        }

        .card-header-custom {
            background-color: #fff;
            border-bottom: 2px solid #f0f0f0;
            padding: 20px 24px;
        }

        .btn-custom {
            border-radius: 10px;
            font-weight: 500;
            padding: 10px 24px;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-primary-custom {
            background-color: #4a90e2;
            border-color: #4a90e2;
            color: #fff;
        }

        .btn-primary-custom:hover {
            background-color: #357abd;
            border-color: #357abd;
            color: #fff;
        }

        .table-custom {
            margin-bottom: 0;
        }

        .table-custom thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
            padding: 16px 20px;
        }

        .table-custom tbody td {
            padding: 16px 20px;
            vertical-align: middle;
            color: #475569;
            border-bottom: 1px solid #f1f5f9;
        }

        .table-custom tbody tr {
            transition: background-color 0.2s;
        }

        .table-custom tbody tr:hover {
            background-color: #f8fafc;
        }

        .form-label-custom {
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .form-control-custom {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            transition: all 0.3s;
        }

        .form-control-custom:focus {
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.15);
            border-color: #4a90e2;
        }

        .footer-custom {
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
        }

        .img-thumbnail-custom {
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .badge-category {
            background-color: #e0e7ff;
            color: #4338ca;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom py-3" th:fragment="navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor"
                    class="bi bi-box-seam" viewBox="0 0 16 16">
                    <path
                        d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5l2.404.961L10.404 2zm3.564 1.426L5.596 5 8 5.961 14.154 3.5zm3.25 1.7-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.84l-6.5-2.6v7.922zM2.5 4.34l-1.5.6v-1.1l1.5-.6zm11 .6v1.1l1.5-.6v-1.1z" />
                </svg>
                <span>Product<span style="font-weight: 400; opacity: 0.8;">Hub</span></span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto ps-4">
                    <li class="nav-item">
                        <a class="nav-link px-3" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" th:href="@{/products}">Products</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span sec:authorize="isAuthenticated()" class="text-white-50 fw-medium me-2">
                        Hello, <strong class="text-white" sec:authentication="name">User</strong>
                    </span>
                    <form th:action="@{/logout}" method="post" class="m-0" sec:authorize="isAuthenticated()">
                        <button class="btn btn-danger rounded-pill px-4 fw-medium" type="submit">Logout</button>
                    </form>
                    <a th:href="@{/login}"
                        class="btn btn-primary-custom rounded-pill px-4 fw-medium text-decoration-none"
                        sec:authorize="!isAuthenticated()">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <footer class="footer-custom text-center py-4 mt-auto" th:fragment="footer">
        <div class="container">
            <p class="mb-0">&copy; 2025 - Phát triển ứng dụng với J2EE.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
